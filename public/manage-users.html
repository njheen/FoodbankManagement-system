<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Users - Admin</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f9; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-bottom: 30px;}
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #0056b3; color: white; }
        .btn { border: none; cursor: pointer; font-weight: bold; border-radius: 4px; padding: 8px 12px; margin-right: 5px;}
        .btn-blue { background: #007bff; color: white; }
        .btn-red { background: #dc3545; color: white; }
        .btn-gray { background: #6c757d; color: white; text-decoration: none; display: inline-block; padding: 10px 15px;}
    </style>
</head>
<body>

<div class="container">
    <h2>Manage Staff</h2>
    <table>
        <thead>
            <tr><th>Staff ID</th><th>Name</th><th>Role</th><th>Contact</th><th>Actions</th></tr>
        </thead>
        <tbody id="staffTable"><tr><td colspan="5">Loading...</td></tr></tbody>
    </table>
</div>

<div class="container">
    <h2>Manage Recipients</h2>
    <table>
        <thead>
            <tr><th>Recipient ID</th><th>Name</th><th>Type</th><th>Contact</th><th>Actions</th></tr>
        </thead>
        <tbody id="recipientTable"><tr><td colspan="5">Loading...</td></tr></tbody>
    </table>
    <br><a href="/index.html" class="btn btn-gray">Back to Main Dashboard</a>
</div>

<script>
    // Security check
    const sessionData = localStorage.getItem('session');
    const user = sessionData ? JSON.parse(sessionData) : null;
    if (!user || !user.user || user.user.ROLE !== 'Admin') {
        alert("Unauthorized."); window.location.href = '/index.html';
    }

    async function loadUsers() {
        // Load Staff
        const staffRes = await fetch('/api/admin/staff');
        const staffData = await staffRes.json();
        let staffHtml = '';
        staffData.forEach(s => {
            staffHtml += `<tr>
                <td>${s.STAFF_ID}</td><td>${s.NAME_STAFF}</td><td>${s.ROLE}</td><td>${s.CONTACT_STAFF}</td>
                <td>
                    <button class="btn btn-blue" onclick="window.location.href='/edit-staff.html?id=${s.STAFF_ID}'">Edit</button>
                    <button class="btn btn-red" onclick="deleteUser('staff', ${s.STAFF_ID})">Delete</button>
                </td></tr>`;
        });
        document.getElementById('staffTable').innerHTML = staffHtml;

        // Load Recipients
        const recRes = await fetch('/api/admin/recipients');
        const recData = await recRes.json();
        let recHtml = '';
        recData.forEach(r => {
            recHtml += `<tr>
                <td>${r.RECIPIENT_ID}</td><td>${r.NAME_RECIPIENT}</td><td>${r.TYPE}</td><td>${r.CONTACT_RECIPIENT || 'N/A'}</td>
                <td>
                    <button class="btn btn-blue" onclick="window.location.href='/edit-recipient.html?id=${r.RECIPIENT_ID}'">Edit</button>
                    <button class="btn btn-red" onclick="deleteUser('recipients', ${r.RECIPIENT_ID})">Delete</button>
                </td></tr>`;
        });
        document.getElementById('recipientTable').innerHTML = recHtml;
    }

    async function deleteUser(type, id) {
        if (!confirm(`Are you sure you want to delete this ${type}?`)) return;
        const res = await fetch(`/api/admin/${type}/${id}`, { method: 'DELETE' });
        if (res.ok) loadUsers();
        else {
            const err = await res.json();
            alert(err.error || "Failed to delete.");
        }
    }

    loadUsers();
</script>

</body>
</html>
