<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Donation System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f9; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #0056b3; color: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px;}
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #f8f9fa; }
        .form-group { margin-bottom: 15px; }
        input, button { padding: 8px; box-sizing: border-box; }
        .btn { border: none; cursor: pointer; font-weight: bold; border-radius: 4px; padding: 8px 12px;}
        .btn-green { background: #28a745; color: white; width: 100%; }
        .btn-red { background: #dc3545; color: white; }
        .btn-blue { background: #007bff; color: white; }
        .btn-logout { background: #dc3545; color: white; }
        .staff-only { display: none; } /* Hidden by default, unlocked by JS */
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div id="welcomeMessage">Welcome!</div>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
    </div>
    
    <div id="adminPanel" class="staff-only" style="background: #e9ecef; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
        <h3>Add New Inventory Item</h3>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="itemId" placeholder="Item ID" style="width: 15%;">
            <input type="text" id="itemName" placeholder="Item Name" style="width: 35%;">
            <input type="text" id="itemType" placeholder="Type" style="width: 25%;">
            <input type="number" id="itemStock" placeholder="Qty" style="width: 15%;">
            <button class="btn btn-green" onclick="addItem()" style="width: 10%;">Add</button>
        </div>
    </div>

    <h3>Available Inventory</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Type</th>
                <th>Quantity</th>
                <th class="staff-only">Actions</th>
            </tr>
        </thead>
        <tbody id="inventoryTable">
            </tbody>
    </table>
</div>

<script>
    let currentUser = null;

    // 1. CHECK AUTHENTICATION ON LOAD
    function checkAuth() {
        const sessionData = localStorage.getItem('session');
        if (!sessionData) {
            window.location.href = '/login.html'; // Kick them out if not logged in
            return;
        }
        
        currentUser = JSON.parse(sessionData);
        
        // Update Welcome Message
        const name = currentUser.role === 'Staff' ? currentUser.user.NAME_STAFF : currentUser.user.NAME_RECIPIENT;
        document.getElementById('welcomeMessage').innerText = `Welcome, ${name} (${currentUser.role})`;

        // Unlock Admin UI if Staff
        if (currentUser.role === 'Staff') {
            document.querySelectorAll('.staff-only').forEach(el => el.style.display = 'table-cell'); // Adjust for table
            document.getElementById('adminPanel').style.display = 'block';
        }
        
        loadItems();
    }

    // 2. LOGOUT
    function logout() {
        localStorage.removeItem('session');
        window.location.href = '/login.html';
    }

    // 3. READ (Fetch Inventory)
    async function loadItems() {
        const response = await fetch('/api/items');
        const items = await response.json();
        const tbody = document.getElementById('inventoryTable');
        tbody.innerHTML = '';
        
        items.forEach(item => {
            let row = `<tr>
                <td>${item.ITEM_ID}</td>
                <td>${item.NAME}</td>
                <td>${item.TYPE}</td>
                <td><strong>${item.STOCK_QUANTITY}</strong></td>`;
            
            // Render Edit/Delete buttons ONLY if Staff
            if (currentUser && currentUser.role === 'Staff') {
                row += `<td class="staff-only" style="display:table-cell;">
                            <button class="btn btn-blue" onclick="editItem(${item.ITEM_ID}, '${item.NAME}', '${item.TYPE}', ${item.STOCK_QUANTITY})">Edit</button>
                            <button class="btn btn-red" onclick="deleteItem(${item.ITEM_ID})">Delete</button>
                        </td>`;
            }
            row += `</tr>`;
            tbody.innerHTML += row;
        });
    }

    // 4. CREATE (Add Item)
    async function addItem() {
        const payload = {
            item_ID: document.getElementById('itemId').value,
            name: document.getElementById('itemName').value,
            type: document.getElementById('itemType').value,
            stock_quantity: document.getElementById('itemStock').value
        };

        const res = await fetch('/api/items', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            document.getElementById('itemId').value = '';
            document.getElementById('itemName').value = '';
            document.getElementById('itemType').value = '';
            document.getElementById('itemStock').value = '';
            loadItems(); 
        } else {
            alert("Error adding item.");
        }
    }

    // 5. UPDATE (Edit Item via Prompts)
    async function editItem(id, currentName, currentType, currentQty) {
        const newName = prompt("Edit Name:", currentName);
        const newType = prompt("Edit Type:", currentType);
        const newQty = prompt("Edit Quantity:", currentQty);

        if (newName !== null && newType !== null && newQty !== null) {
            const res = await fetch(`/api/items/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: newName, type: newType, stock_quantity: newQty })
            });
            
            if (res.ok) loadItems();
            else alert("Error updating item.");
        }
    }

    // 6. DELETE
    async function deleteItem(id) {
        if (confirm("Are you sure you want to delete this item?")) {
            const res = await fetch(`/api/items/${id}`, { method: 'DELETE' });
            if (res.ok) {
                loadItems();
            } else {
                const err = await res.json();
                alert(err.error);
            }
        }
    }

    // Initialize Page
    checkAuth();
</script>

</body>
</html>
