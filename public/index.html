<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Donation System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f4f4f9; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #0056b3; color: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px;}
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #f8f9fa; }
        .form-group { margin-bottom: 15px; }
        input, button { padding: 8px; box-sizing: border-box; }
        .btn { border: none; cursor: pointer; font-weight: bold; border-radius: 4px; padding: 8px 12px;}
        .btn-green { background: #28a745; color: white; width: 100%; }
        .btn-red { background: #dc3545; color: white; }
        .btn-blue { background: #007bff; color: white; }
        .btn-logout { background: #dc3545; color: white; }
        .staff-only { display: none; } /* Hidden by default, unlocked by JS */
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div id="welcomeMessage">Welcome!</div>
        <button class="btn btn-logout" onclick="logout()">Logout</button>
    </div>
    
    <div id="adminPanel" class="staff-only" style="background: #e9ecef; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
        <h3>Add New Inventory Item</h3>
        <button class="btn btn-green" onclick="window.location.href='/add-items.html'">+ Add New Items</button>

        <h3>Manage Staff</h3>
        <button id="adminBtn" class="btn btn-green" style="display: none; background-color: #17a2b8;" onclick="window.location.href='/register-staff.html'">+ Register Staff</button>

        <h3>Manage Users</h3>
        <button id="manageUsersBtn" class="btn btn-blue" style="display: none;" onclick="window.location.href='/manage-users.html'">⚙️ Manage Users</button>
    </div>

        <!-- code for displaying search and filter options -->
    <div style="display: flex; gap: 10px; margin-bottom: 20px; align-items: center; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd;">
        <div style="flex: 1;">
            <label style="font-size: 12px; font-weight: bold; color: #555;">Search by Name</label>
            <input type="text" id="searchName" placeholder="e.g., Canned Beans" oninput="applyFilters()">
        </div>
        <div style="flex: 1;">
            <label style="font-size: 12px; font-weight: bold; color: #555;">Filter by Type</label>
            <input type="text" id="searchType" placeholder="e.g., Food" oninput="applyFilters()">
        </div>
        <div style="flex: 1;">
            <label style="font-size: 12px; font-weight: bold; color: #555;">Filter by Expiry Date</label>
            <input type="date" id="searchExpiry" onchange="applyFilters()">
        </div>
        <div style="margin-top: 15px;">
            <button class="btn btn-gray" onclick="clearFilters()">Clear</button>
        </div>
    </div>

    <h3>Available Food Inventory</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Type</th>
                <th>Quantity</th>
                <th>Expiry Date</th>
                <th style="background: #e9ecef;">Donation ID</th>
                <th style="background: #e9ecef;">Managed By</th>
                <th class="staff-only">Actions</th>
            </tr>
        </thead>
        <tbody id="inventoryTable">
            </tbody>
    </table>
</div>

<script>
let currentUser = null;
    let currentInventory = []; // NEW: We will store the data here so strings don't break our HTML!

    // 1. CHECK AUTHENTICATION ON LOAD
    function checkAuth() {
        const sessionData = localStorage.getItem('session');
        if (!sessionData) {
            window.location.href = '/login.html'; 
            return;
        }

           // Check session and apply Admin-specific UI changes
        const sessionStr = localStorage.getItem('session');
        if (sessionStr) {
            const userSession = JSON.parse(sessionStr);
        
        // userSession.role just says "Staff". We need the specific DB role:
        if (userSession.user && userSession.user.ROLE === 'Admin') {
            document.getElementById('adminBtn').style.display = 'inline-block';
            document.getElementById('manageUsersBtn').style.display = 'inline-block'; // Show new button
        }
    }
        
        currentUser = JSON.parse(sessionData);
        const name = currentUser.role === 'Staff' ? currentUser.user.NAME_STAFF : currentUser.user.NAME_RECIPIENT;
        document.getElementById('welcomeMessage').innerText = `Welcome, ${name} (${currentUser.role})`;

        if (currentUser.role === 'Staff') {
            document.querySelectorAll('.staff-only').forEach(el => el.style.display = 'table-cell'); 
            document.getElementById('adminPanel').style.display = 'block';
        }
        
        loadItems();
    }

    // 2. LOGOUT
    function logout() {
        localStorage.removeItem('session');
        window.location.href = '/login.html';
    }

    // 3. READ (Fetch Inventory)
    // 1. FETCH ITEMS FROM SERVER
    async function loadItems() {
        try {
            const res = await fetch('/api/items');
            currentInventory = await res.json();
            
            // Draw the table with the full inventory initially
            applyFilters(); 
        } catch (error) {
            console.error("Error loading items:", error);
        }
    }

    // 2. FILTER THE INVENTORY
    function applyFilters() {
        // Grab what the user typed (convert to lowercase for easy matching)
        const nameQuery = document.getElementById('searchName').value.toLowerCase();
        const typeQuery = document.getElementById('searchType').value.toLowerCase();
        const expiryQuery = document.getElementById('searchExpiry').value; // Format: YYYY-MM-DD

        // Filter the array based on inputs
        const filteredData = currentInventory.filter(item => {
            const matchName = item.NAME ? item.NAME.toLowerCase().includes(nameQuery) : false;
            const matchType = item.TYPE ? item.TYPE.toLowerCase().includes(typeQuery) : false;
            
            let matchExpiry = true;
            if (expiryQuery) {
                // Convert database date to YYYY-MM-DD to match the HTML date picker
                const itemDate = item.EXPIRY_DATE ? new Date(item.EXPIRY_DATE).toISOString().split('T')[0] : '';
                matchExpiry = (itemDate === expiryQuery);
            }

            return matchName && matchType && matchExpiry;
        });

        // Send the filtered data to be drawn on the screen
        renderTable(filteredData);
    }

    // 3. DRAW THE TABLE
    function renderTable(dataToRender) {
        const tbody = document.querySelector('table tbody');
        tbody.innerHTML = ''; // Clear the current table
        
        // Show a message if no items match the search
        if (dataToRender.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No items found matching your filters.</td></tr>';
            return;
        }

        // Draw rows for the filtered data
        dataToRender.forEach(item => {
            const expDate = item.EXPIRY_DATE ? new Date(item.EXPIRY_DATE).toLocaleDateString() : 'N/A';
            const donationID = item.DONATION_ID || 'N/A';
            const manager = item.MANAGER_NAME || 'Unassigned';

            let row = `<tr>
                <td>${item.ITEM_ID}</td>
                <td>${item.NAME}</td>
                <td>${item.TYPE}</td>
                <td><strong>${item.STOCK_QUANTITY}</strong></td>
                <td>${expDate}</td>;
                <td style="color:#0056b3; font-weight:bold;">${donationID}</td>
                <td>${manager}</td>`;
                
            
            // Check session to see if we should show Staff Actions (Edit/Delete)
            const sessionData = localStorage.getItem('session');
            const currentUser = sessionData ? JSON.parse(sessionData) : null;
            
            if (currentUser && currentUser.role === 'Staff') {
                row += `<td class="staff-only" style="display:table-cell;">
                            <button class="btn btn-blue" onclick="editItem(${item.ITEM_ID})">Edit</button>
                            <button class="btn btn-red" onclick="deleteItem(${item.ITEM_ID})">Delete</button>
                        </td>`;
            } else {
                row += `<td class="staff-only" style="display:none;"></td>`;
            }
            row += `</tr>`;
            tbody.innerHTML += row;
        });
    }

    // 4. CLEAR FILTERS BUTTON
    function clearFilters() {
        document.getElementById('searchName').value = '';
        document.getElementById('searchType').value = '';
        document.getElementById('searchExpiry').value = '';
        applyFilters(); // Re-draw the table with everything
    }

    // 4. CREATE (Add Item)
    async function addItem() {
        const payload = {
            item_ID: document.getElementById('itemId').value,
            name: document.getElementById('itemName').value,
            type: document.getElementById('itemType').value,
            stock_quantity: document.getElementById('itemStock').value
        };

        const res = await fetch('/api/items', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            document.getElementById('itemId').value = '';
            document.getElementById('itemName').value = '';
            document.getElementById('itemType').value = '';
            document.getElementById('itemStock').value = '';
            loadItems(); 
        } else {
            alert("Error adding item.");
        }
    }

 // 5. UPDATE (Redirect to edit page)
    function editItem(id) {
        // Redirect to the new edit page, passing the ID in the URL
        window.location.href = `/edit.html?id=${id}`;
    }

    // 6. DELETE
    async function deleteItem(id) {
        if (confirm("Are you sure you want to delete this item?")) {
            const res = await fetch(`/api/items/${id}`, { method: 'DELETE' });
            if (res.ok) {
                loadItems();
            } else {
                const err = await res.json();
                alert(err.error);
            }
        }
    }

    // Initialize Page
    checkAuth();
</script>

</body>
</html>
